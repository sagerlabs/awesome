<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT Copilot</title>
    <!-- marked.js: 优先从 CDN 加载，CDN 失败时降级为纯文本显示 -->
    <script>
        // 内联极简 marked 降级实现，CDN 加载失败时使用
        window._markedFallback = function(text) {
            return text
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"
            onerror="window.marked={parse:window._markedFallback}">
    </script>
    <!-- 字体：优先 Google Fonts，离线时自动降级为系统中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
          rel="stylesheet"
          onerror="this.remove()">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:     #c8a96e;
            --gold-dim: #8a6f3f;
            --dark-0:   #0a0c10;
            --dark-1:   #111318;
            --dark-2:   #181c24;
            --dark-3:   #1f2430;
            --dark-4:   #262d3a;
            --text-1:   #e8e0d0;
            --text-2:   #9a9080;
            --text-3:   #5a5448;
            --accent:   #4a9eff;
            --error:    #ff5a5a;
            --bubble-size: 56px;
            --panel-w:  380px;
            --panel-h:  560px;
            --radius:   16px;
        }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #121723;
            min-height: 100vh;
            /* 演示背景 */
            background-image:
                    radial-gradient(circle at 18% 18%, rgba(200,169,110,0.12) 0%, transparent 28%),
                    radial-gradient(circle at 82% 24%, rgba(74,158,255,0.14) 0%, transparent 32%),
                    linear-gradient(135deg, #111723 0%, #1b2433 48%, #101319 100%);
            color: var(--text-1);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: radial-gradient(circle at 50% 50%, #000 0%, transparent 72%);
        }

        body.wails {
            width: 100vw;
            height: 100vh;
            min-height: 0;
            background: transparent;
            background-image: none;
        }

        body.wails::before,
        body.wails .demo-hint,
        body.wails #bubble,
        body.wails .panel-settings {
            display: none;
        }

        /* ── 演示页面提示 ─────────────────────────────────────────── */
        .demo-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-3);
            font-size: 13px;
            letter-spacing: 0.1em;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }
        .demo-hint span { color: var(--gold-dim); }

        /* ── 悬浮气泡 ─────────────────────────────────────────────── */
        #bubble {
            position: fixed;
            z-index: 9999;
            width: var(--bubble-size);
            height: var(--bubble-size);
            border-radius: 50%;
            cursor: grab;
            user-select: none;
            /* 默认位置右下角 */
            bottom: 32px;
            right: 32px;

            background: conic-gradient(
                    from 180deg at 50% 50%,
                    #c8a96e 0deg,
                    #4a9eff 120deg,
                    #c8a96e 240deg,
                    #4a9eff 360deg
            );
            box-shadow:
                    0 0 0 2px var(--dark-1),
                    0 0 0 3px var(--gold-dim),
                    0 8px 32px rgba(200,169,110,0.4),
                    0 0 60px rgba(74,158,255,0.15);

            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s, transform 0.2s;
            animation: bubble-breathe 3s ease-in-out infinite;
        }

        #bubble:hover {
            transform: scale(1.08);
            box-shadow:
                    0 0 0 2px var(--dark-1),
                    0 0 0 3px var(--gold),
                    0 12px 40px rgba(200,169,110,0.6),
                    0 0 80px rgba(74,158,255,0.25);
        }

        #bubble.dragging {
            cursor: grabbing;
            transform: scale(1.05);
            animation: none;
            transition: none;
        }

        #bubble.panel-open {
            animation: none;
        }

        @keyframes bubble-breathe {
            0%, 100% { box-shadow: 0 0 0 2px var(--dark-1), 0 0 0 3px var(--gold-dim), 0 8px 32px rgba(200,169,110,0.4), 0 0 60px rgba(74,158,255,0.15); }
            50%       { box-shadow: 0 0 0 2px var(--dark-1), 0 0 0 4px var(--gold), 0 12px 40px rgba(200,169,110,0.55), 0 0 80px rgba(74,158,255,0.25); }
        }

        /* 气泡内图标 */
        .bubble-icon {
            width: 26px;
            height: 26px;
            position: relative;
        }
        .bubble-icon::before {
            content: '⚔';
            font-size: 20px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.8));
        }

        /* 未读角标 */
        .bubble-badge {
            position: absolute;
            top: 2px; right: 2px;
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--dark-0);
            display: none;
        }
        .bubble-badge.show { display: block; }

        /* ── 对话面板 ─────────────────────────────────────────────── */
        #panel {
            position: fixed;
            z-index: 9998;
            width: var(--panel-w);
            height: var(--panel-h);
            background:
                    linear-gradient(180deg, rgba(31,36,48,0.96), rgba(10,12,16,0.98)),
                    var(--dark-1);
            border-radius: var(--radius);
            border: 1px solid rgba(200,169,110,0.18);
            box-shadow:
                    0 32px 80px rgba(0,0,0,0.7),
                    0 0 0 1px rgba(74,158,255,0.08),
                    0 0 44px rgba(74,158,255,0.10),
                    inset 0 1px 0 rgba(255,255,255,0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;

            /* 初始隐藏 */
            opacity: 0;
            transform: scale(0.85) translateY(16px);
            pointer-events: none;
            transition: opacity 0.25s cubic-bezier(0.34,1.56,0.64,1),
            transform 0.25s cubic-bezier(0.34,1.56,0.64,1);

            /* 默认位置（由 JS 动态计算） */
            bottom: 100px;
            right: 32px;
        }

        #panel.open {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        body.wails #panel {
            position: fixed;
            inset: 10px;
            width: auto;
            height: auto;
            opacity: 1;
            transform: none;
            pointer-events: all;
            border-radius: 22px;
            box-shadow:
                    0 26px 70px rgba(0,0,0,0.58),
                    0 0 0 1px rgba(200,169,110,0.18),
                    0 0 40px rgba(74,158,255,0.12),
                    inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* 面板顶栏 */
        .panel-header {
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--dark-4);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            background:
                    radial-gradient(circle at 12% 0%, rgba(200,169,110,0.16), transparent 34%),
                    linear-gradient(to bottom, rgba(24,28,36,0.98), rgba(17,19,24,0.96));
            --wails-draggable: drag;
        }

        .panel-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, #c8a96e, #4a9eff, #c8a96e);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(200,169,110,0.4);
        }

        .panel-title { flex: 1; }
        .panel-title h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-1);
            letter-spacing: 0.05em;
        }
        .panel-title p {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 5px;
            box-shadow: 0 0 4px #4caf50;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .panel-close,
        .panel-settings {
            width: 28px; height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-3);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
            --wails-draggable: no-drag;
        }
        .panel-close:hover,
        .panel-settings:hover { background: var(--dark-4); color: var(--text-1); }

        /* 设置弹窗 */
        .settings-modal {
            display: none;
            position: absolute;
            top: 52px; right: 12px;
            z-index: 10;
            background: var(--dark-2);
            border: 1px solid var(--dark-4);
            border-radius: 12px;
            padding: 14px;
            width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: msg-in 0.15s ease;
        }
        .settings-modal.show { display: block; }
        .settings-modal label {
            font-size: 11px; color: var(--text-2);
            display: block; margin-bottom: 6px;
            letter-spacing: 0.05em;
        }
        .settings-modal input {
            width: 100%; padding: 7px 10px;
            background: var(--dark-3); border: 1px solid var(--dark-4);
            border-radius: 8px; color: var(--text-1);
            font-size: 12px; font-family: 'JetBrains Mono', 'Courier New', monospace;
            outline: none;
        }
        .settings-modal input:focus { border-color: var(--gold-dim); }
        .settings-save {
            margin-top: 10px; width: 100%;
            padding: 7px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            color: var(--dark-0); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: filter 0.2s;
        }
        .settings-save:hover { filter: brightness(1.15); }
        .settings-tip {
            margin-top: 8px; font-size: 10px; color: var(--text-3); text-align: center;
        }

        /* 消息列表 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--dark-4); border-radius: 4px; }

        /* 消息气泡 */
        .msg {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: msg-in 0.2s ease;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        .msg.ai .msg-avatar {
            background: linear-gradient(135deg, var(--gold-dim), var(--accent));
        }
        .msg.user .msg-avatar {
            background: var(--dark-3);
            color: var(--text-2);
        }

        .msg-bubble {
            max-width: 82%;
            padding: 10px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg.ai .msg-bubble {
            background: linear-gradient(180deg, rgba(31,36,48,0.94), rgba(24,28,36,0.92));
            border: 1px solid rgba(200,169,110,0.12);
            color: var(--text-1);
            border-bottom-left-radius: 4px;
        }

        .msg.user .msg-bubble {
            background: linear-gradient(135deg, rgba(29,72,103,0.96), rgba(13,38,58,0.96));
            border: 1px solid rgba(74,158,255,0.28);
            color: var(--text-1);
            border-bottom-right-radius: 4px;
        }

        /* 打字指示器 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
        }
        .typing-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--gold-dim);
            animation: typing 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30%          { transform: translateY(-4px); opacity: 1; }
        }

        /* 推荐标签 */
        .suggestions {
            padding: 0 14px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }

        .suggestion-tag {
            padding: 6px 10px;
            background: rgba(31,36,48,0.72);
            border: 1px solid rgba(200,169,110,0.12);
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .suggestion-tag:hover {
            background: rgba(200,169,110,0.10);
            border-color: var(--gold-dim);
            color: var(--gold);
        }

        /* 输入区 */
        .input-area {
            padding: 10px 12px 12px;
            border-top: 1px solid rgba(200,169,110,0.10);
            background: linear-gradient(180deg, rgba(24,28,36,0.94), rgba(17,19,24,0.98));
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(10,12,16,0.72);
            border: 1px solid rgba(200,169,110,0.16);
            border-radius: 14px;
            padding: 8px 8px 8px 12px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px rgba(200,169,110,0.08);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-1);
            font-size: 13px;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            resize: none;
            max-height: 100px;
            line-height: 1.5;
            min-height: 20px;
        }

        #chat-input::placeholder { color: var(--text-3); }

        .send-btn {
            width: 32px; height: 32px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            color: var(--dark-0);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.2s;
            align-self: flex-end;
        }
        .send-btn:hover { transform: scale(1.05); filter: brightness(1.15); }
        .send-btn:disabled {
            background: var(--dark-4);
            color: var(--text-3);
            cursor: not-allowed;
            transform: none;
        }

        /* 底部提示 */
        .input-hint {
            font-size: 10px;
            color: var(--text-3);
            text-align: center;
            margin-top: 6px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            letter-spacing: 0.05em;
        }
        .input-hint kbd {
            display: inline-block;
            padding: 1px 4px;
            background: var(--dark-4);
            border-radius: 3px;
            font-size: 9px;
            color: var(--text-2);
            font-family: inherit;
        }

        /* ── Markdown 渲染样式 ───────────────────────────────────────── */
        .msg-bubble.md            { white-space: normal !important; line-height: 1.4 !important; }

        .msg-bubble.md p          { margin: 0 0 2px 0 !important; }
        .msg-bubble.md h1,
        .msg-bubble.md h2,
        .msg-bubble.md h3         { margin: 4px 0 2px 0 !important; }
        .msg-bubble.md ul,
        .msg-bubble.md ol         { margin: 0 0 2px 0 !important; }
        .msg-bubble.md li         { margin: 0 0 1px 0 !important; }
        .msg-bubble.md hr         { border: none; border-top: 1px solid var(--dark-4); margin: 6px 0 !important; }

        .msg-bubble.md p:empty    { display: none !important; margin: 0 !important; padding: 0 !important; }
        .msg-bubble.md p br:first-child:last-child { display: none !important; }
        .msg-bubble.md br + br    { display: none !important; }

        /* 基础元素样式保留 */
        .msg-bubble.md code       { font-family: 'JetBrains Mono', monospace; background: var(--dark-0); color: var(--gold); padding: 1px 5px; border-radius: 4px; font-size: 11px; }
        .msg-bubble.md pre        { background: var(--dark-0); border-radius: 8px; padding: 6px 8px !important; overflow-x: auto; margin: 4px 0 !important; border: 1px solid var(--dark-4); }
        .msg-bubble.md pre code   { background: none; padding: 0; color: var(--text-1); font-size: 11px; }
        .msg-bubble.md strong     { color: var(--text-1); font-weight: 600; }
        .msg-bubble.md em         { color: var(--gold-dim); font-style: italic; }
        .msg-bubble.md blockquote { border-left: 3px solid var(--gold-dim); padding-left: 10px;
            color: var(--text-2); margin: 6px 0; font-style: italic; }
        .msg-bubble.md table      { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
        .msg-bubble.md th         { background: var(--dark-3); color: var(--gold);
            padding: 4px 8px; text-align: left; font-weight: 500; }
        .msg-bubble.md td         { padding: 4px 8px; border-top: 1px solid var(--dark-4); color: var(--text-2); }
        .msg-bubble.md a          { color: var(--accent); text-decoration: none; }
        .msg-bubble.md a:hover    { text-decoration: underline; }
        .msg-bubble.md hr         { border: none; border-top: 1px solid var(--dark-4); margin: 8px 0; }

        /* 3. 强制隐藏大模型生成的多余连续换行 (Hack) */
        .msg-bubble.md br + br    { display: none; }
    </style>
</head>
<body>

<div class="demo-hint">
    点击右下角气泡开始对话<br>
    <span>TFT Copilot · 云顶之弈助手</span>
</div>

<!-- 悬浮气泡 -->
<div id="bubble">
    <div class="bubble-icon"></div>
    <div class="bubble-badge" id="badge"></div>
</div>

<!-- 对话面板 -->
<div id="panel">
    <!-- 顶栏 -->
    <div class="panel-header">
        <div class="panel-avatar">⚔</div>
        <div class="panel-title">
            <h3>TFT Copilot</h3>
            <p><span class="status-dot"></span>云顶之弈 · 阵容分析</p>
        </div>
        <button class="panel-settings" id="settings-btn" title="服务器设置">⚙</button>
        <button class="panel-close" id="close-btn" title="最小化">╱╲</button>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settings-modal">
        <label>后端服务器地址</label>
        <input type="text" id="api-input" placeholder="http://your-server:8080" />
        <button class="settings-save" id="settings-save">保存并重连</button>
        <div class="settings-tip">修改后当前对话会重置</div>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages">
        <!-- 欢迎消息 -->
        <div class="msg ai">
            <div class="msg-avatar">⚔</div>
            <div class="msg-bubble md" id="welcome-msg"></div>
        </div>
    </div>

    <!-- 快捷输入建议 -->
    <div class="suggestions" id="suggestions">
        <span class="suggestion-tag" onclick="fillInput('当前版本最强的三套阵容是什么？')">版本强势</span>
        <span class="suggestion-tag" onclick="fillInput('剑魔打工强吗？')">剑魔打工</span>
        <span class="suggestion-tag" onclick="fillInput('四费卡谁能C？')">四费主C</span>
        <span class="suggestion-tag" onclick="fillInput('海魔人能玩吗？')">羁绊查询</span>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
        <div class="input-row">
      <textarea
              id="chat-input"
              placeholder="输入英雄、装备或问题..."
              rows="1"
      ></textarea>
            <button class="send-btn" id="send-btn" title="发送">
                ➤
            </button>
        </div>
        <div class="input-hint">
            <kbd>Enter</kbd> 发送 &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> 换行
        </div>
    </div>
</div>

<script>
    // ── 配置 ──────────────────────────────────────────────────────────
    // ── 运行环境检测 ──────────────────────────────────────────────────
    // Wails 环境：window.go 存在，通过 Go binding 直接调用
    // 浏览器/Electron 环境：通过 SSE HTTP 接口
    const IS_WAILS = typeof window !== 'undefined' && !!window.go
    if (IS_WAILS) document.body.classList.add('wails')

    // ── 配置加载 ──────────────────────────────────────────────────────
    // Electron 环境：通过 IPC 读取用户数据目录的 config.json（可持久修改）
    // 浏览器环境：fetch ./config.json，或使用 localStorage 缓存
    let API_BASE   = 'http://localhost:8080'
    let STREAM_URL = `${API_BASE}/v1/tft/nlu/stream`

    function applyConfig(cfg) {
        if (cfg && cfg.api_base) {
            API_BASE   = cfg.api_base
            STREAM_URL = `${API_BASE}/v1/tft/nlu/stream`
        }
    }

    async function loadConfig() {
        if (window.electronAPI) {
            // Electron：从用户数据目录读（main.js 负责初始化和持久化）
            const cfg = await window.electronAPI.getConfig()
            applyConfig(cfg)
        } else {
            // 浏览器：优先 localStorage，其次 fetch config.json
            const saved = localStorage.getItem('tft_api_base')
            if (saved) { applyConfig({ api_base: saved }); return }
            try {
                const res = await fetch('./config.json')
                if (res.ok) applyConfig(await res.json())
            } catch (e) {
                console.log('config.json 未找到，使用默认地址')
            }
        }
    }
    loadConfig()

    // ── DOM 引用 ──────────────────────────────────────────────────────
    const bubble   = document.getElementById('bubble')
    const panel    = document.getElementById('panel')
    const messages = document.getElementById('messages')
    const input    = document.getElementById('chat-input')
    const sendBtn  = document.getElementById('send-btn')
    const closeBtn = document.getElementById('close-btn')
    const badge    = document.getElementById('badge')
    const welcomeMsg = document.getElementById('welcome-msg')

    welcomeMsg.innerHTML = renderMd(
        "我是你的 **TFT Copilot**（云顶教练浮窗）。\n\n" +
        "你可以直接问阵容、装备、羁绊、几费卡强度和打工过渡。\n\n" +
        "> 例如：`剑魔打工强吗？`、`四费卡谁能C？`"
    )

    // ── 面板开关 ──────────────────────────────────────────────────────
    let panelOpen = IS_WAILS
    if (IS_WAILS) {
        panel.classList.add('open')
        bubble.classList.add('panel-open')
        closeBtn.textContent = '—'
        closeBtn.title = '最小化'
    }

    function togglePanel() {
        if (IS_WAILS) return
        panelOpen = !panelOpen
        panel.classList.toggle('open', panelOpen)
        bubble.classList.toggle('panel-open', panelOpen)
        badge.classList.remove('show')
        if (panelOpen) {
            positionPanel()
            setTimeout(() => input.focus(), 300)
        }
    }

    function positionPanel() {
        // 根据气泡当前位置计算面板应该出现在哪里
        const bRect  = bubble.getBoundingClientRect()
        const pw     = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-w'))
        const ph     = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-h'))
        const margin = 12
        const vw     = window.innerWidth
        const vh     = window.innerHeight

        // 水平：优先显示在气泡左侧，不够则右侧
        let left = bRect.left - pw - margin
        if (left < margin) left = bRect.right + margin
        if (left + pw > vw - margin) left = vw - pw - margin

        // 垂直：从气泡上方往上展开，不够则往下
        let top = bRect.bottom - ph
        if (top < margin) top = bRect.top
        if (top + ph > vh - margin) top = vh - ph - margin

        panel.style.left   = `${Math.max(margin, left)}px`
        panel.style.top    = `${Math.max(margin, top)}px`
        panel.style.right  = 'auto'
        panel.style.bottom = 'auto'
    }

    bubble.addEventListener('click', (e) => {
        if (!isDragged) togglePanel()
    })
    closeBtn.addEventListener('click', togglePanel)
    closeBtn.addEventListener('click', async (e) => {
        if (!IS_WAILS) return
        e.stopPropagation()
        if (window.go?.main?.App?.Minimize) await window.go.main.App.Minimize()
    })

    // ── 气泡拖拽 ──────────────────────────────────────────────────────
    let isDragging = false
    let isDragged  = false   // 区分点击和拖拽
    let dragOffX = 0, dragOffY = 0

    bubble.addEventListener('mousedown', (e) => {
        isDragging = true
        isDragged  = false
        dragOffX = e.clientX - bubble.getBoundingClientRect().left
        dragOffY = e.clientY - bubble.getBoundingClientRect().top
        bubble.classList.add('dragging')
        e.preventDefault()
    })

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return
        isDragged = true

        const x = e.clientX - dragOffX
        const y = e.clientY - dragOffY
        const size = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bubble-size'))

        const clampedX = Math.max(0, Math.min(window.innerWidth  - size, x))
        const clampedY = Math.max(0, Math.min(window.innerHeight - size, y))

        bubble.style.left   = clampedX + 'px'
        bubble.style.top    = clampedY + 'px'
        bubble.style.right  = 'auto'
        bubble.style.bottom = 'auto'

        if (panelOpen) positionPanel()
    })

    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false
            bubble.classList.remove('dragging')
            snapToEdge()
        }
    })

    // 松手后吸附到最近的边
    function snapToEdge() {
        const bRect = bubble.getBoundingClientRect()
        const size  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bubble-size'))
        const cx    = bRect.left + size / 2
        const margin = 16

        // 吸附到左边或右边
        const snapLeft = cx < window.innerWidth / 2
        const targetX  = snapLeft ? margin : window.innerWidth - size - margin

        bubble.style.transition = 'left 0.3s cubic-bezier(0.34,1.56,0.64,1), top 0.3s ease'
        bubble.style.left = targetX + 'px'

        setTimeout(() => {
            bubble.style.transition = ''
            if (panelOpen) positionPanel()
        }, 350)
    }

    // 触摸支持
    bubble.addEventListener('touchstart', (e) => {
        const t = e.touches[0]
        isDragging = true; isDragged = false
        dragOffX = t.clientX - bubble.getBoundingClientRect().left
        dragOffY = t.clientY - bubble.getBoundingClientRect().top
        bubble.classList.add('dragging')
    }, { passive: true })

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return
        isDragged = true
        const t = e.touches[0]
        const size = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bubble-size'))
        const x = Math.max(0, Math.min(window.innerWidth  - size, t.clientX - dragOffX))
        const y = Math.max(0, Math.min(window.innerHeight - size, t.clientY - dragOffY))
        bubble.style.left = x + 'px'; bubble.style.top = y + 'px'
        bubble.style.right = 'auto';  bubble.style.bottom = 'auto'
        if (panelOpen) positionPanel()
    }, { passive: true })

    document.addEventListener('touchend', () => {
        if (isDragging) { isDragging = false; bubble.classList.remove('dragging'); snapToEdge() }
    })

    // ── 消息渲染 ──────────────────────────────────────────────────────
    function addMessage(role, text) {
        const div = document.createElement('div')
        div.className = `msg ${role}`
        div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '⚔' : '你'}</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `
        messages.appendChild(div)
        scrollToBottom()
        return div.querySelector('.msg-bubble')
    }

    // 打字指示器
    function showTyping() {
        const div = document.createElement('div')
        div.className = 'msg ai'; div.id = 'typing'
        div.innerHTML = `
    <div class="msg-avatar">⚔</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `
        messages.appendChild(div)
        scrollToBottom()
        return div
    }

    function hideTyping() {
        const el = document.getElementById('typing')
        if (el) el.remove()
    }

    function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    // ── 发送消息 ──────────────────────────────────────────────────────
    let isStreaming = false

    async function sendMessage() {
        const text = input.value.trim()
        if (!text || isStreaming) return

        // 显示用户消息
        addMessage('user', text)
        input.value = ''
        autoResize()

        // 隐藏快捷标签（首次发送后）
        document.getElementById('suggestions').style.display = 'none'

        isStreaming = true
        sendBtn.disabled = true
        sendBtn.textContent = '⏸'

        // 显示打字动画
        const typingEl = showTyping()

        // 创建 AI 消息气泡（先隐藏）
        let aiBubble = null
        let fullText = ''

        try {
            if (IS_WAILS) {
                // ── Wails 模式：直接调 Go binding，一次性返回 ──────────────
                // Wails 暂不支持流式，Go 端 Analyze 返回完整结果
                typingEl.remove()
                aiBubble = addMessage('ai', '')

                const result = await window.go.main.App.Analyze(text)
                fullText = result
                aiBubble.classList.add('md')
                aiBubble.innerHTML = renderMd(fullText.replace(/\n\s*\n/g, '\n\n'))
            } else {
                // ── HTTP SSE 模式：流式逐 chunk 显示 ────────────────────────
                const response = await fetch(STREAM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: text, plain: false }),
                    signal: AbortSignal.timeout(90000),
                })

                if (!response.ok) throw new Error(`HTTP ${response.status}`)

                const reader  = response.body.getReader()
                const decoder = new TextDecoder()
                let   buffer  = ''

                let streamDone = false
                while (!streamDone) {
                    const { done, value } = await reader.read()
                    if (done) break

                    buffer += decoder.decode(value, { stream: true })
                    const lines = buffer.split('\n')
                    buffer = lines.pop()

                    for (const line of lines) {
                        if (!line.startsWith('data:')) continue
                        const raw = line.slice(5).trim()
                        if (!raw) continue
                        try {
                            const chunk = JSON.parse(raw)
                            if (chunk.type === 'token' && chunk.content) {
                                if (!aiBubble) { typingEl.remove(); aiBubble = addMessage('ai', '') }
                                fullText += chunk.content
                                aiBubble.textContent = fullText
                                scrollToBottom()
                            } else if (chunk.type === 'done') {
                                if (aiBubble && fullText) {
                                    aiBubble.classList.add('md')
                                    aiBubble.innerHTML = renderMd(fullText)
                                    scrollToBottom()
                                }
                                streamDone = true  // 退出 while
                                break
                            } else if (chunk.type === 'error') {
                                throw new Error(chunk.error || '推理出错')
                            }
                        } catch (parseErr) { /* 跳过非 JSON 行 */ }
                    }
                }
            }

            // 如果没收到任何内容
            if (!aiBubble) {
                hideTyping()
                addMessage('ai', '暂时没有找到合适的推荐，请尝试提供更多英雄或装备信息。')
            }

        } catch (err) {
            hideTyping()
            if (!aiBubble) {
                const errBubble = addMessage('ai', '')
                errBubble.classList.add('md')
                errBubble.innerHTML = renderMd(`**连接失败**：${err.message}\n\n请检查服务器是否启动：\`${API_BASE}\``)
            }
        } finally {
            isStreaming = false
            sendBtn.disabled = false
            sendBtn.textContent = '➤'
            // 未开着面板时显示角标
            if (!panelOpen) badge.classList.add('show')
        }
    }

    // ── 快捷标签填充 ──────────────────────────────────────────────────
    function fillInput(text) {
        input.value = text
        input.focus()
        autoResize()
    }

    // 封装一个渲染函数，放在 script 顶部
    function renderMd(text) {
        const cleaned = text
            .replace(/\n{3,}/g, '\n\n')   // 3个以上空行压缩成2个
            .replace(/^\s+|\s+$/g, '')     // 去首尾空白
        return marked.parse(cleaned)
    }

    // ── 输入框自动高度 ────────────────────────────────────────────────
    function autoResize() {
        input.style.height = 'auto'
        input.style.height = Math.min(input.scrollHeight, 100) + 'px'
    }
    input.addEventListener('input', autoResize)

    // Enter 发送，Shift+Enter 换行
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault()
            sendMessage()
        }
    })
    // ── 设置弹窗 ──────────────────────────────────────────────────────
    const settingsBtn   = document.getElementById('settings-btn')
    const settingsModal = document.getElementById('settings-modal')
    const apiInput      = document.getElementById('api-input')
    const settingsSave  = document.getElementById('settings-save')

    settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        const isOpen = settingsModal.classList.toggle('show')
        if (isOpen) apiInput.value = API_BASE
    })

    // 点击面板外关闭设置弹窗
    document.addEventListener('click', (e) => {
        if (!settingsModal.contains(e.target) && e.target !== settingsBtn) {
            settingsModal.classList.remove('show')
        }
    })

    settingsSave.addEventListener('click', async () => {
        const val = apiInput.value.trim().replace(/\/+$/, '')
        if (!val) return

        applyConfig({ api_base: val })

        if (window.electronAPI) {
            // Electron：持久化到用户数据目录的 config.json
            const result = await window.electronAPI.saveConfig({ api_base: val })
            console.log('配置已保存到:', result.path)
        } else {
            // 浏览器：存 localStorage
            localStorage.setItem('tft_api_base', val)
        }

        settingsModal.classList.remove('show')

        // 清空对话，提示已切换
        messages.innerHTML = ''
        const b = addMessage('ai', '')
        b.classList.add('md')
        b.innerHTML = renderMd('✅ 已连接到 `' + val + '`')
        document.getElementById('suggestions').style.display = 'flex'
    })

    sendBtn.addEventListener('click', sendMessage)

    // ── Electron 鼠标穿透控制 ─────────────────────────────────────────
    // 浏览器直接打开时 window.electronAPI 不存在，降级为空函数
    const electron = window.electronAPI || { setInteractive: ()=>{}, setPassthrough: ()=>{} }

    // 鼠标进入气泡/面板区域：停止穿透，让 Electron 窗口响应点击
    bubble.addEventListener('mouseenter', () => electron.setInteractive())
    panel.addEventListener('mouseenter',  () => electron.setInteractive())

    // 鼠标离开所有交互区域：恢复穿透，点击事件透传到底层窗口
    bubble.addEventListener('mouseleave', () => {
        if (!panelOpen) electron.setPassthrough()
    })
    panel.addEventListener('mouseleave', () => {
        if (!panelOpen) electron.setPassthrough()
    })

    // 面板关闭时恢复穿透
    const _origToggle = togglePanel
    window.togglePanel = function() {
        _origToggle()
        if (!panelOpen) electron.setPassthrough()
        else electron.setInteractive()
    }
</script>
</body>
</html>
