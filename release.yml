name: Release

on:
  push:
    tags:
      - 'v*'   # 推送 v1.0.0 这样的 tag 时触发

permissions:
  contents: write  # 允许创建 Release 和上传产物

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Linux 打包需要额外依赖
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenjp2-tools rpm

      - name: Build
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac 代码签名（没有开发者账号可以跳过，用户需手动允许）
          # CSC_LINK: ${{ secrets.MAC_CERT }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      # 上传构建产物到 GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true   # 自动从 commit 生成 changelog
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}