name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/**'   # 推 release/* 分支也触发，产物上传为 Artifact
  workflow_dispatch:
    inputs:
      api_base:
        description: '后端服务器地址'
        required: false
        default: 'http://your-server-ip:8080'

permissions:
  contents: write

jobs:
  # ── Job 1: Go 检查 + 测试 ─────────────────────────────────────────
  checks:
    name: Release Branch Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go checks
        run: |
          HAS_ERRORS=0

          UNFORMATTED=$(gofmt -l $(find . -name "*.go" -not -path "*/vendor/*") 2>/dev/null)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ gofmt 未通过：$UNFORMATTED"
            HAS_ERRORS=1
          else
            echo "✅ gofmt 通过"
          fi

          if ! go vet ./...; then
            echo "❌ go vet 失败"
            HAS_ERRORS=1
          else
            echo "✅ go vet 通过"
          fi

          if find . -name "*_test.go" -not -path "*/vendor/*" | grep -q .; then
            if ! go test ./tft/tool/... ./tft/data/... -v -count=1; then
              echo "❌ 单元测试失败"
              HAS_ERRORS=1
            else
              echo "✅ 单元测试通过"
            fi
          fi

          [ $HAS_ERRORS -eq 0 ] || exit 1

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: Notify about release
        run: echo "✅ 检查通过，版本 ${{ steps.version.outputs.version }}，开始打包"

  # ── Job 2: 三平台打包 ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: checks
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libopenjp2-tools rpm

      - name: Inject API config
        shell: bash
        run: |
          API_BASE="${{ github.event.inputs.api_base || 'http://your-server-ip:8080' }}"
          VERSION="${{ needs.checks.outputs.version }}"
          echo "{ \"api_base\": \"$API_BASE\", \"version\": \"$VERSION\" }" > frontend/config.json
          echo "✅ config.json → $API_BASE ($VERSION)"

      - name: Build
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # tag 触发 → 上传到 GitHub Release（Releases 页面可见）
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 分支触发 → 上传为 Artifact（Actions 页面右上角 Artifacts 可下载，7天）
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: tft-copilot-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
            dist/*.tar.gz
          retention-days: 7