name: PR Checks
on:
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Go tests and checks
        run: |
          if [ -f go.mod ]; then
            go fmt ./...
            go vet ./...
            go test ./... -v
          fi
      
      - name: Run Python tests
        run: |
          if [ -d tests ]; then pytest tests/ -v; fi
      
      - name: Run linting
        run: |
          if [ -f .flake8 ] || [ -d src ]; then flake8 src/ 2>/dev/null || true; fi
      
      - name: Run formatting check
        run: |
          if command -v black &> /dev/null; then black --check . 2>/dev/null || true; fi
