name: PR Checks
on:
  pull_request:
    branches: [ main, master ]

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install staticcheck and errcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest || true
          go install github.com/kisielk/errcheck@latest || true
      
      - name: Check gofmt
        run: |
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            gofmt -l .
            if [ -n "$(gofmt -l .)" ]; then
              echo "❌ gofmt 检查失败，请运行 gofmt -w ."
              exit 1
            fi
          fi
      
      - name: Run govet
        run: |
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            go vet ./... || true
          fi
      
      - name: Run staticcheck
        run: |
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            staticcheck ./... || true
          fi
      
      - name: Run errcheck
        run: |
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            errcheck ./... || true
          fi
      
      - name: Run Go tests
        run: |
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            go test ./... -v -coverprofile=coverage.txt || true
            if [ -f coverage.txt ]; then
              go tool cover -func=coverage.txt || true
            fi
          fi

  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Python tests
        run: |
          if [ -d tests ]; then pytest tests/ -v || true; fi
      
      - name: Run linting
        run: |
          if [ -f .flake8 ] || [ -d src ]; then flake8 src/ 2>/dev/null || true; fi
      
      - name: Run formatting check
        run: |
          if command -v black &> /dev/null; then black --check . 2>/dev/null || true; fi

  docs-check:
    name: Docs & CHANGELOG Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if docs need update
        id: check-docs
        run: |
          # 检查是否有 Go 或 Python 代码变更
          CODE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(go|py)$' || true)
          
          if [ -n "$CODE_CHANGED" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
            
            # 检查是否更新了文档
            DOCS_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '(README|readme|DOCS|docs|\.md)$' || true)
            
            if [ -z "$DOCS_CHANGED" ]; then
              echo "docs_not_updated=true" >> $GITHUB_OUTPUT
            fi
            
            # 检查是否更新了 CHANGELOG
            CHANGELOG_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -i 'changelog' || true)
            
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "changelog_not_updated=true" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Show check results
        run: |
          echo "代码变更: ${{ steps.check-docs.outputs.code_changed }}"
          echo "文档未更新: ${{ steps.check-docs.outputs.docs_not_updated }}"
          echo "CHANGELOG 未更新: ${{ steps.check-docs.outputs.changelog_not_updated }}"
