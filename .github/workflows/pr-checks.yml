name: PR Checks
on:
  pull_request:
    branches: [ main, master, dev ]

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install staticcheck and errcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/kisielk/errcheck@latest
      
      - name: Run all Go checks
        id: go-checks
        run: |
          HAS_ERRORS=0
          
          echo "::group::Check gofmt"
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            FMT_OUT=$(gofmt -l .)
            if [ -n "$FMT_OUT" ]; then
              echo "❌ gofmt 检查失败，以下文件需要格式化："
              echo "$FMT_OUT"
              echo "请运行: gofmt -w ."
              HAS_ERRORS=1
            else
              echo "✅ gofmt 检查通过"
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run go vet"
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            if go vet ./...; then
              echo "✅ go vet 检查通过"
            else
              echo "❌ go vet 检查失败"
              HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run staticcheck"
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            if staticcheck ./...; then
              echo "✅ staticcheck 检查通过"
            else
              echo "❌ staticcheck 检查失败"
              HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run errcheck"
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            if errcheck ./...; then
              echo "✅ errcheck 检查通过"
            else
              echo "❌ errcheck 检查失败"
              HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run Go tests"
          if ls *.go 2>/dev/null || ls */*.go 2>/dev/null; then
            if go test ./... -v -coverprofile=coverage.txt; then
              echo "✅ Go tests 检查通过"
              if [ -f coverage.txt ]; then
                go tool cover -func=coverage.txt
              fi
            else
              echo "❌ Go tests 检查失败"
              HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "has_errors=$HAS_ERRORS" >> $GITHUB_OUTPUT
      
      - name: Final check result
        run: |
          if [ "${{ steps.go-checks.outputs.has_errors }}" = "1" ]; then
            echo "❌ 部分检查失败，请查看上方日志详情"
            exit 1
          else
            echo "✅ 所有检查通过"
            exit 0
          fi

  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Python checks
        id: python-checks
        run: |
          HAS_ERRORS=0
          
          echo "::group::Run Python tests"
          if [ -d tests ]; then
            if pytest tests/ -v; then
              echo "✅ Python tests 检查通过"
            else
              echo "❌ Python tests 检查失败"
              HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run linting (flake8)"
          if [ -f .flake8 ] || [ -d src ]; then
            if flake8 src/ 2>/dev/null; then
              echo "✅ flake8 检查通过"
            else
              echo "❌ flake8 检查失败"
              # 注意：原脚本这里使用了 || true，意味着 flake8 失败不计入错误
              # 如果你想让 flake8 失败导致 CI 失败，请去掉下面的注释
              # HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "::group::Run formatting check (black)"
          if command -v black &> /dev/null; then
            if black --check . 2>/dev/null; then
              echo "✅ black 检查通过"
            else
              echo "❌ black 检查失败"
              # 同上，原脚本使用了 || true
              # HAS_ERRORS=1
            fi
          fi
          echo "::endgroup::"
          
          echo "has_errors=$HAS_ERRORS" >> $GITHUB_OUTPUT
      
      - name: Final check result
        run: |
          if [ "${{ steps.python-checks.outputs.has_errors }}" = "1" ]; then
            echo "❌ 部分检查失败"
            exit 1
          else
            echo "✅ 所有检查通过"
            exit 0
          fi

  docs-check:
    name: Docs & CHANGELOG Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if docs need update
        id: check-docs
        run: |
          # 检查是否有 Go 或 Python 代码变更
          CODE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(go|py)$' || true)
          
          if [ -n "$CODE_CHANGED" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
            
            # 检查是否更新了文档
            DOCS_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '(README|readme|DOCS|docs|\.md)$' || true)
            
            if [ -z "$DOCS_CHANGED" ]; then
              echo "docs_not_updated=true" >> $GITHUB_OUTPUT
            fi
            
            # 检查是否更新了 CHANGELOG
            CHANGELOG_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -i 'changelog' || true)
            
            if [ -z "$CHANGELOG_CHANGED" ]; then
              echo "changelog_not_updated=true" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Show check results
        run: |
          echo "代码变更: ${{ steps.check-docs.outputs.code_changed }}"
          echo "文档未更新: ${{ steps.check-docs.outputs.docs_not_updated }}"
          echo "CHANGELOG 未更新: ${{ steps.check-docs.outputs.changelog_not_updated }}"
