name: PR Auto Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Auto Review
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            
            let reviewComment = '## 自动 Review 报告\n\n';
            let hasCriticalIssues = false;
            let issues = [];
            
            for (const file of files) {
              // 检查环境变量文件
              if (file.filename.includes('.env')) {
                issues.push(`⚠️ **严重**: 检测到环境变量文件 ${file.filename} - 不应提交到仓库`);
                hasCriticalIssues = true;
              }
              
              // 检查大文件
              if (file.additions > 500) {
                issues.push(`📝 **注意**: ${file.filename} 添加了 ${file.additions} 行，建议拆分 PR`);
              }
              
              // 检查 Go 代码问题
              if (file.filename.endsWith('.go')) {
                // 获取文件内容
                const { data: content } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: file.filename,
                  ref: context.payload.pull_request.head.sha
                });
                
                const code = Buffer.from(content.content, 'base64').toString();
                
                // 检查硬编码密码
                if (code.includes('password') || code.includes('secret') || code.includes('token')) {
                  issues.push(`🔑 **严重**: ${file.filename} 可能包含硬编码的敏感信息`);
                  hasCriticalIssues = true;
                }
                
                // 检查 nil 指针风险
                if (code.includes('nil') && !code.includes('if') && !code.includes('return')) {
                  issues.push(`⚠️ **警告**: ${file.filename} 可能存在 nil 指针风险`);
                }
                
                // 检查没有错误处理
                if (code.includes('err =') && !code.includes('if err != nil')) {
                  issues.push(`❌ **严重**: ${file.filename} 存在未处理的错误`);
                  hasCriticalIssues = true;
                }
              }
            }
            
            // 生成评论
            if (issues.length > 0) {
              reviewComment += issues.join('\n\n') + '\n\n';
            } else {
              reviewComment += '✅ 未发现明显问题，等待人工 review\n';
            }
            
            // 添加评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: reviewComment
            });
            
            // 如果有严重问题，请求更改
            if (hasCriticalIssues) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'REQUEST_CHANGES',
                body: '❌ 检测到严重问题，请修复后重新提交'
              });
            }
